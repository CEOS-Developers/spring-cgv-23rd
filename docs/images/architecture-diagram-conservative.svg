<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .tiny { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .badge { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #1d4ed8; }
    </style>
  </defs>

  <rect width="1600" height="920" rx="30" fill="url(#bg)"/>

  <text x="86" y="86" class="title">CGV Deployment Architecture</text>
  <text x="86" y="120" class="subtitle">Conservative version based only on files currently confirmed in the repository</text>

  <g filter="url(#shadow)">
    <rect x="86" y="160" width="1430" height="690" rx="28" fill="#ffffff" stroke="#CBD5E1" stroke-width="3"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="126" y="202" width="250" height="118" rx="24" fill="#111827"/>
    <text x="251" y="258" text-anchor="middle" class="label" fill="#ffffff">GitHub Repository</text>
    <text x="251" y="286" text-anchor="middle" class="tiny" fill="#CBD5E1">source code push</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="438" y="202" width="290" height="118" rx="24" fill="#DBEAFE"/>
    <text x="583" y="252" text-anchor="middle" class="label">GitHub Actions</text>
    <text x="583" y="280" text-anchor="middle" class="tiny">clean • test • bootJar</text>
    <text x="583" y="302" text-anchor="middle" class="tiny">upload deploy artifacts</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="792" y="202" width="320" height="118" rx="24" fill="#E2E8F0"/>
    <text x="952" y="248" text-anchor="middle" class="label">Deployment Artifacts</text>
    <text x="952" y="278" text-anchor="middle" class="tiny">build/libs/*.jar</text>
    <text x="952" y="300" text-anchor="middle" class="tiny">Dockerfile • docker-compose.cicd.yml</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1176" y="202" width="290" height="118" rx="24" fill="#FEF3C7"/>
    <text x="1321" y="252" text-anchor="middle" class="label">EC2 Deploy</text>
    <text x="1321" y="280" text-anchor="middle" class="tiny">scp artifacts</text>
    <text x="1321" y="302" text-anchor="middle" class="tiny">ssh + docker compose up --build -d</text>
  </g>

  <line x1="376" y1="261" x2="438" y2="261" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="728" y1="261" x2="792" y2="261" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1112" y1="261" x2="1176" y2="261" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="126" y="390" width="1320" height="410" rx="28" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="3"/>
    <text x="166" y="438" class="label">Runtime on EC2</text>
    <text x="166" y="464" class="tiny">Only components confirmed by workflow, compose file, and application config are shown below.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="158" y="566" width="150" height="92" rx="20" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="3"/>
    <circle cx="208" cy="601" r="14" fill="#64748B"/>
    <circle cx="242" cy="601" r="14" fill="#64748B"/>
    <path d="M190 634C190 620 201 612 208 612C215 612 226 620 226 634" fill="#94A3B8"/>
    <path d="M224 634C224 620 235 612 242 612C249 612 260 620 260 634" fill="#94A3B8"/>
    <text x="233" y="682" text-anchor="middle" class="small">Users</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="520" width="340" height="186" rx="24" fill="#FFF7ED" stroke="#FDBA74" stroke-width="3"/>
    <rect x="404" y="542" width="170" height="28" rx="14" fill="#FFEDD5"/>
    <text x="489" y="561" text-anchor="middle" class="badge" fill="#C2410C">docker-compose.cicd.yml</text>
    <text x="550" y="604" text-anchor="middle" class="label">EC2 Ubuntu Host</text>
    <text x="550" y="632" text-anchor="middle" class="tiny">APP_PORT 8080 exposed</text>
    <text x="550" y="656" text-anchor="middle" class="tiny">spring-cgv-app container</text>
    <text x="550" y="680" text-anchor="middle" class="tiny">TZ=Asia/Seoul</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="792" y="520" width="318" height="186" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="3"/>
    <rect x="816" y="542" width="124" height="28" rx="14" fill="#DCFCE7"/>
    <text x="878" y="561" text-anchor="middle" class="badge" fill="#15803D">Dockerfile</text>
    <text x="951" y="604" text-anchor="middle" class="label">Spring Boot App</text>
    <text x="951" y="632" text-anchor="middle" class="tiny">Java 21 JRE</text>
    <text x="951" y="656" text-anchor="middle" class="tiny">java -jar app.jar</text>
    <text x="951" y="680" text-anchor="middle" class="tiny">JWT • JPA • Swagger • Actuator</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1182" y="520" width="232" height="186" rx="24" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="3"/>
    <rect x="1206" y="542" width="102" height="28" rx="14" fill="#FEE2E2"/>
    <text x="1257" y="561" text-anchor="middle" class="badge" fill="#B91C1C">.env</text>
    <text x="1298" y="604" text-anchor="middle" class="label">H2 File DB</text>
    <text x="1298" y="632" text-anchor="middle" class="tiny">jdbc:h2:file:/app/data/cgv_db</text>
    <text x="1298" y="656" text-anchor="middle" class="tiny">MODE=MySQL</text>
    <text x="1298" y="680" text-anchor="middle" class="tiny">No separate RDS in current CI/CD</text>
  </g>

  <line x1="308" y1="612" x2="380" y2="612" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="720" y1="612" x2="792" y2="612" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1110" y1="612" x2="1182" y2="612" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1120" y="390" width="326" height="86" rx="20" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="3"/>
    <text x="1283" y="425" text-anchor="middle" class="label">Health Check</text>
    <text x="1283" y="451" text-anchor="middle" class="tiny">curl http://localhost:8080/actuator/health</text>
  </g>

  <line x1="1321" y1="320" x2="1321" y2="390" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="126" y="726" width="1320" height="74" rx="18" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <text x="786" y="770" text-anchor="middle" class="tiny">Excluded on purpose: VPC, public/private subnet, internet gateway, RDS, Redis. These are not explicitly defined in the current repository.</text>
  </g>
</svg>
