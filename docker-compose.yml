services:
  app:
    image: ${DOCKER_USERNAME}/ceos-app:latest
    container_name: ceos-app
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - LOG_PATH=/app/logs
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-fs", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  redis:
    image: redis:alpine
    container_name: ceos-redis
    ports:
      - "6379:6379"
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3


networks:
  monitoring:
    name: monitoring
    driver: bridge