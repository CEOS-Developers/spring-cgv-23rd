version: '3.8'

services:
  redis-server:
    image: redis
    container_name: redis-server
    ports:
      - "6379:6379"
    restart: always

  app:
    image: taeik21/cgv-app-new:latest
    container_name: test
    ports:
      - "80:8080"
    env_file:
      - .env
    depends_on:
      - redis-server
    restart: always