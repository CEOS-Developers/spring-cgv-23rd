auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

# 로그 보존 기간 설정
limits_config:
  retention_period: 168h  # 로그 보존 기간: 7일
chunk_store_config:
  max_look_back_period: 168h

compactor:
  working_directory: /loki/compactor #작업 임시 디렉토리
  shared_store: filesystem
  compaction_interval: 10m # 10분마다 압축 작업
  retention_enabled: true # 자동 삭제 켜기
  retention_delete_delay: 2h # 삭제 결정 후 2시간 뒤 삭제