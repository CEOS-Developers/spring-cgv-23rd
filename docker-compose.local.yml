services:
  mysql:
    image: mysql:8.0
    container_name: cgv-mysql-local
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=cgv_db
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cgv-redis-local
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mysql-data:
