name: Deploy

on:
  push:
    branches: [ "taeik21" ]

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push application image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cgv-app-new:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cgv-app-new:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cgv-app-new:buildcache,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy application to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            mkdir -p /home/ubuntu/app/alloy/positions
            cd /home/ubuntu/app

            echo "${{ secrets.ENV_VARS }}" > .env

            cat <<'ALLOYEOF' > alloy/config.alloy
            loki.write "default" {
              endpoint {
                url = "http://172.31.41.20:3100/loki/api/v1/push"
              }
            }

            local.file_match "system_logs" {
              path_targets = [{
                __path__ = "/var/log/*.log",
                job      = "varlogs",
                host     = env("HOSTNAME"),
              }]
            }

            loki.source.file "system_logs" {
              targets       = local.file_match.system_logs.targets
              forward_to    = [loki.write.default.receiver]
              tail_from_end = false
            }

            local.file_match "app_logs" {
              path_targets = [{
                __path__ = "/logs/*.log",
                job      = "applogs",
                host     = env("HOSTNAME"),
              }]
            }

            loki.source.file "app_logs" {
              targets    = local.file_match.app_logs.targets
              forward_to = [loki.write.default.receiver]
            }

            prometheus.scrape "spring_app" {
              targets = [{
                __address__ = "app:8080",
              }]
              metrics_path    = "/actuator/prometheus"
              scrape_interval = "15s"
              forward_to      = [prometheus.remote_write.monitoring.receiver]
              job_name        = "spring-app"
            }

            prometheus.remote_write "monitoring" {
              endpoint {
                url = "http://172.31.41.20:9090/api/v1/write"
              }
              external_labels = {
                host = env("HOSTNAME"),
                env  = "production",
              }
            }
            ALLOYEOF

            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              redis-server:
                image: redis:latest
                container_name: redis-server
                ports:
                  - "6379:6379"
                restart: always
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              app:
                image: ${{ secrets.DOCKER_USERNAME }}/cgv-app-new:${{ github.sha }}
                container_name: test
                ports:
                  - "80:8080"
                env_file:
                  - .env
                volumes:
                  - /home/ubuntu/logs:/logs
                depends_on:
                  redis-server:
                    condition: service_healthy
                restart: always

              alloy:
                image: grafana/alloy:v1.8.2
                container_name: alloy
                restart: always
                volumes:
                  - /home/ubuntu/logs:/logs:ro
                  - /var/log:/var/log:ro
                  - /home/ubuntu/app/alloy/config.alloy:/etc/alloy/config.alloy
                  - /home/ubuntu/app/alloy/positions:/var/lib/alloy/data
                command:
                  - run
                  - /etc/alloy/config.alloy
                  - --server.http.listen-addr=0.0.0.0:12345
                ports:
                  - "12345:12345"
                depends_on:
                  - app
            EOF

            sudo docker compose pull app
            sudo docker compose up -d

            for i in {1..36}; do
              curl -s -f http://localhost/actuator/health > /dev/null && break
              [ $i -eq 36 ] && exit 1
              sleep 5
            done

            sudo docker image prune -f