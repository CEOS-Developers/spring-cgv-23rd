name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            shinae1023/ceos-app:latest
            shinae1023/ceos-app:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to EC2
        env:
          IMAGE_TAG: shinae1023/ceos-app:${{ github.event.workflow_run.head_sha }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eu

            IMAGE_TAG="${{ env.IMAGE_TAG }}"
            PREVIOUS_IMAGE="$(docker inspect ceos-app --format '{{.Config.Image}}' 2>/dev/null || true)"

            docker pull "$IMAGE_TAG"
            docker rm -f ceos-app-candidate || true

            docker run -d \
              --name ceos-app-candidate \
              -p 8081:8080 \
              --env-file ~/.env \
              --restart unless-stopped \
              "$IMAGE_TAG"

            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:8081/health-check >/dev/null; then
                break
              fi
              if [ "$i" -eq 15 ]; then
                docker logs ceos-app-candidate || true
                docker rm -f ceos-app-candidate || true
                exit 1
              fi
              sleep 5
            done

            docker stop ceos-app || true
            docker rm ceos-app || true

            if docker run -d \
              --name ceos-app \
              -p 8080:8080 \
              --env-file ~/.env \
              --restart unless-stopped \
              "$IMAGE_TAG"; then
              for i in $(seq 1 15); do
                if curl -fsS http://127.0.0.1:8080/health-check >/dev/null; then
                  docker rm -f ceos-app-candidate || true
                  exit 0
                fi
                sleep 5
              done
            fi

            docker logs ceos-app || true
            docker rm -f ceos-app || true

            if [ -n "$PREVIOUS_IMAGE" ]; then
              docker run -d \
                --name ceos-app \
                -p 8080:8080 \
                --env-file ~/.env \
                --restart unless-stopped \
                "$PREVIOUS_IMAGE"

              for i in $(seq 1 15); do
                if curl -fsS http://127.0.0.1:8080/health-check >/dev/null; then
                  break
                fi
                sleep 5
              done
            fi

            docker rm -f ceos-app-candidate || true
            exit 1
