name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' 

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Build JAR
        run: ./gradlew bootJar -x test

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ceos-app:latest
            ${{ secrets.DOCKER_USERNAME }}/ceos-app:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          envs: IMAGE_TAG,DOCKER_USERNAME
          script: |
            set -e
            cd /home/ubuntu/app

            echo ">>> Pulling image"
            sudo docker pull ${DOCKER_USERNAME}/ceos-app:${IMAGE_TAG}
            sudo docker tag ${DOCKER_USERNAME}/ceos-app:${IMAGE_TAG} ${DOCKER_USERNAME}/ceos-app:latest

            echo ">>> Recreating container"
            sudo docker compose up -d

            echo ">>> Health check"
            for i in $(seq 1 30); do
              if curl -fs http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                echo "Healthy!"; break
              fi
              if [ $i -eq 30 ]; then sudo docker compose logs --tail=100; exit 1; fi
              sleep 2
            done

            sudo docker image prune -f
