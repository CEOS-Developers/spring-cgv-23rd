name: Build and Deploy

on:
  push:
    branches:
      - main
      - Oh-Jisong
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_DIR: ${{ vars.APP_DIR || '/home/ubuntu/spring-cgv-23rd' }}
  APP_PORT: ${{ vars.APP_PORT || '8080' }}

jobs:
  build:
    name: Test and Build Jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests and build jar
        run: ./gradlew clean test bootJar --no-daemon

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifacts
          path: |
            .dockerignore
            Dockerfile
            docker-compose.cicd.yml
            build/libs/*.jar

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Create deployment directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p "${{ env.APP_DIR }}"

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifacts
          path: deploy-artifacts

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy-artifacts/.dockerignore,deploy-artifacts/Dockerfile,deploy-artifacts/docker-compose.cicd.yml,deploy-artifacts/build/libs/*.jar"
          target: ${{ env.APP_DIR }}
          strip_components: 1

      - name: Deploy application to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR="${{ env.APP_DIR }}"
            APP_PORT="${{ env.APP_PORT }}"

            cd "$APP_DIR"

            cat > .env <<EOF
            APP_PORT=$APP_PORT
            DB_URL=jdbc:h2:file:/app/data/cgv_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
            DB_USERNAME=sa
            DB_PASSWORD=
            DB_DRIVER_CLASS_NAME=org.h2.Driver
            HIBERNATE_DIALECT=org.hibernate.dialect.H2Dialect
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JPA_DDL_AUTO=${{ vars.JPA_DDL_AUTO || 'update' }}
            JPA_SHOW_SQL=${{ vars.JPA_SHOW_SQL || 'false' }}
            JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS=${{ vars.JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS || '3600' }}
            JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS=${{ vars.JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS || '1209600' }}
            EOF

            sudo docker compose -f docker-compose.cicd.yml down || true
            sudo docker compose -f docker-compose.cicd.yml up --build -d
            sudo docker image prune -f

            for i in $(seq 1 18); do
              if curl -fsS "http://localhost:$APP_PORT/actuator/health"; then
                exit 0
              fi
              sleep 10
            done

            sudo docker logs --tail 200 spring-cgv-app
            exit 1
