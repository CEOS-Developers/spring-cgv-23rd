name: Deploy Development Server

on:
  push:
    branches: [ "Seungwon326" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/cgv-backend
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push application image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy application to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop cgv-server || true;
            docker rm cgv-server || true;

            docker pull ${{ secrets.DOCKER_USERNAME }}/cgv-backend:latest;

            docker run -d -p 80:8080 \
              --name cgv-server \
              -e db_url=${{ secrets.DB_URL }} \
              -e db_name=cgv \
              -e db_username=admin \
              -e password=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              -e JWT_VALIDITY=3600 \
              -e PAYMENT_SERVER=https://ceos.diggindie.com \
              -e GITHUB_ID=Seungwon326 \
              -e PAYMENT_SECRET_KEY=${{ secrets.PAYMENT_SECRET_KEY }} \
              -e REDIS_HOST=172.17.0.1 \
              ${{ secrets.DOCKER_USERNAME }}/cgv-backend:latest;

            docker image prune -f;
