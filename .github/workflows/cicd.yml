name: Build and Deploy

on:
  push:
    branches:
      - main
      - Oh-Jisong
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests and build jar
        run: ./gradlew clean test bootJar --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push application image
        run: |
          docker build -t "$IMAGE_NAME:$IMAGE_TAG" -t "$IMAGE_NAME:latest" .
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker push "$IMAGE_NAME:latest"

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Copy docker-compose file to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ vars.APP_DIR || '/home/ubuntu/spring-cgv-23rd' }}

      - name: Deploy application to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR="${{ vars.APP_DIR || '/home/ubuntu/spring-cgv-23rd' }}"
            APP_PORT="${{ vars.APP_PORT || '8080' }}"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            cat > .env <<EOF
            APP_IMAGE=${{ env.IMAGE_NAME }}:latest
            APP_PORT=$APP_PORT
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JPA_DDL_AUTO=${{ vars.JPA_DDL_AUTO || 'update' }}
            JPA_SHOW_SQL=${{ vars.JPA_SHOW_SQL || 'false' }}
            JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS=${{ vars.JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS || '3600' }}
            JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS=${{ vars.JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS || '1209600' }}
            EOF

            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f

            sleep 10
            curl -fsS "http://localhost:$APP_PORT/actuator/health"
