name: Build & Test

on:
  pull_request:
    branches: [ "taeik21" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Test with Gradle
        run: ./gradlew clean build -x test --no-daemon