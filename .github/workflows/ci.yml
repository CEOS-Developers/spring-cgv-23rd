name: CI/CD

on:
  push:
    branches: [ "Jong0128", "main" ]
  pull_request:
    branches: [ "Jong0128", "main" ]

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build application
        run: ./gradlew clean bootJar --no-daemon

  deploy:
    name: Build Image and Deploy to EC2
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/Jong0128' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/deploy-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/deploy-test:latest
            docker stop cgv 2>/dev/null || true
            docker rm cgv 2>/dev/null || true
            docker run -d \
              -p 8080:8080 \
              --env-file /home/ubuntu/.env \
              --name cgv \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/deploy-test:latest
            docker image prune -f
