spring:
  datasource:
    url: jdbc:mysql://${DB_URL:localhost}:3306/cgv_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.cgv.spring_boot: INFO
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
