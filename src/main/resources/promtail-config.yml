server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push #로그를 전송할 목적지

scrape_configs:
  - job_name: log-demo
    static_configs:
      - targets:
          - localhost
        labels: #이후 grafana에서 검색 시 사용할 태그
          job: spring-boot
          app: log-demo
          __path__: /var/log/spring-boot/*.log # 해당 폴더의 모든 .log 파일을 긁어라

    # 로그 파싱 파이프라인
    pipeline_stages:
      # 타임스탬프 추출
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3})'

      # 로그 레벨 추출
      - regex:
          expression: '\[.*?\]\s+(?P<level>(TRACE|DEBUG|INFO|WARN|ERROR))'

      # 레이블 추가 (위에서 추출한 level 값을 Loki 레이블로 등록)
      - labels:
          level:

      # 타임스탬프 파싱 (위에서 추출한 timestamp를 실제 시간으로 파싱)
      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000'
          location: "Asia/Seoul" #⭐️⭐️⭐️

      # 출력 포맷 설정
      - output:
          source: message # 원본 로그 메시지 전체 저장