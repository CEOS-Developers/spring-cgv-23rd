spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    org.hibernate.SQL: info

jwt:
  secret: ${JWT_SECRET}

payment:
  secret-key: ${PAYMENT_SECRET_KEY}
