spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: 127.0.0.1
      port: 6379

jwt:
  secret: ${secret_key}
  access-token-validity-in-milliseconds: 1800000
  refresh-token-validity-in-milliseconds: 1209600000

logging:
  level:
    org.hibernate.SQL: debug
