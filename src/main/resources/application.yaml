spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cgv_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000

payment:
  base-url: ${PAYMENT_BASE_URL:https://ceos.diggindie.com}
  store-id: ${PAYMENT_STORE_ID}

logging:
  level:
    com.cgv.spring_boot: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
