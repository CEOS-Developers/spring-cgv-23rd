spring:
  application:
    name: cgv-clone

  profiles:
    default: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    main:
      hikari:
        maximum-pool-size: 10
        pool-name: MainHikariPool
    lock:
      hikari:
        maximum-pool-size: 5
        pool-name: LockHikariPool

  jpa:
    properties:
      hibernate:
        format_sql: true

jwt:
  expiration: 3600000
  refresh-expiration: 86400000

payment:
  base-url: 'https://ceos.diggindie.com/'
  store-id: 'Jong0128'

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
        exclude: env, heapdump, threaddump, configprops, quartz
  metrics:
    tags:
      application: cgv-clone
